<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Võ Ngọc Phú | Bio Links</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: #e2e8f0;
            --accent-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            position: relative;
            background-color: #000;
        }

        /* 1. VIDEO NỀN NỘI BỘ */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%; height: 100%;
            object-fit: cover; /* Phủ kín màn hình */
            position: absolute;
            top: 0; left: 0;
        }

        /* 2. LỚP PHỦ TRÊN VIDEO (Giúp chữ nổi bật nhưng vẫn thấy video rõ) */
        .video-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(15,23,42,0.2) 0%, rgba(15,23,42,0.6) 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* Header Profile */
        .profile-header {
            text-align: center;
            margin-bottom: 2.5rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .profile-pic {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 1.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 5px;
        }

        /* 3. HIỆU ỨNG KÍNH TRONG SUỐT CHO SECTION */
        .links-section {
            width: 100%;
            margin-bottom: 2.5rem;
            padding: 2rem 1.5rem;
            border-radius: 30px;
            
            /* Lớp nền cực mỏng và độ mờ (blur) nhẹ để nhìn xuyên qua video */
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px) saturate(120%);
            -webkit-backdrop-filter: blur(8px) saturate(120%);
            
            border: 1px solid rgba(255, 255, 255, 0.15); /* Viền kính mỏng */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* 4. NÚT BẤM KÍNH TRONG SUỐT VÀ HIỆU ỨNG QUÉT SÁNG */
        .link-btn {
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
            padding: 1.2rem 1.5rem;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.4s ease;
            overflow: hidden;
            
            /* Nền nút mỏng tang, độ mờ cực thấp */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2); /* Viền sáng hơn một chút để tách khỏi nền */
        }

        /* Hiệu ứng tia sáng quét ngang khi Hover */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(
                to right, 
                transparent, 
                rgba(255, 255, 255, 0.25), 
                transparent
            );
            transform: skewX(-25deg);
            transition: 0.7s;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-btn:hover::before {
            left: 150%;
        }

        .link-btn i {
            font-size: 1.4rem;
            margin-right: 18px;
            width: 25px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .link-text {
            flex-grow: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .footer {
            margin: 2rem 0;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Responsive cho điện thoại */
        @media (max-width: 480px) {
            .container { width: 95%; }
            .name { font-size: 1.4rem; }
            .links-section { padding: 1.5rem 1rem; }
        }
    </style>
</head>

<script>
    document.addEventListener('contextmenu', event => event.preventDefault());

    document.onkeydown = function(e) {
        // Chặn F12
        if(e.keyCode == 123) { return false; }
        // Chặn Ctrl+Shift+I (Mở tab Developer Tools)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        // Chặn Ctrl+Shift+C (Mở tab Element)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
        // Chặn Ctrl+Shift+J (Mở tab Console)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
        // Chặn Ctrl+U (View Source)
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
    }
</script>
